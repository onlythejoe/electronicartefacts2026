      - generic [ref=f2e82]:
        - paragraph [ref=f2e83]: CADRE DU PROJET
        - heading "Brief, contexte et cadre de fonctionnement réunis." [level=2] [ref=f2e84]
        - paragraph [ref=f2e85]: Cette section rassemble le brief, les contraintes, les résultats et les preuves publiques dans un cadre de projet lisible.
      - generic [ref=f2e86]:
        - article [ref=f2e87]:
          - paragraph [ref=f2e88]: Brief
          - heading "Standardiser l’enregistrement professionnel de parole dans le navigateur afin d’exporter des voix propres, révisables et accompagnées des métadonnées utiles aux workflows en aval." [level=3] [ref=f2e89]
        - article [ref=f2e90]:
          - paragraph [ref=f2e91]: Contexte
          - paragraph [ref=f2e92]: Les données vocales sont souvent capturées avec des outils improvisés, des dossiers peu structurés et un contexte incomplet. Cela fragilise révision, consentement, contrôle qualité, doublage et préparation de datasets avant même tout workflow de modèle ou d’archive.
        - article [ref=f2e93]:
          - paragraph [ref=f2e94]: Contraintes
          - list [ref=f2e95]:
            - listitem [ref=f2e96]: Garder les enregistrements et workspaces locaux au navigateur et aux dossiers choisis par l’utilisateur.
            - listitem [ref=f2e97]: Rendre visibles les permissions micro, la durabilité du stockage et les chemins d’export avant l’enregistrement.
            - listitem [ref=f2e98]: Préserver la frontière entre préparation de dataset et entraînement de modèle.
            - listitem [ref=f2e99]: Utiliser des formats ouverts et une documentation lisible hors de l’application.
            - listitem [ref=f2e100]: Maintenir une application déployable comme surface statique GitHub Pages.
        - article [ref=f2e101]:
          - paragraph [ref=f2e102]: Résultats
          - list [ref=f2e103]:
            - listitem [ref=f2e104]: Une application GitHub Pages live pour capturer la parole localement dans un navigateur sécurisé.
            - listitem [ref=f2e105]: Un dépôt open source documenté avec notes d’architecture, de corpus, de workspace et d’export.
            - listitem [ref=f2e106]: Un modèle d’export structuré pour WAV, transcriptions, timing, intentions, rapports qualité et manifestes.
            - listitem [ref=f2e107]: Un workflow privacy-first où les enregistrements utilisateurs ne sont pas envoyés à un service distant par le site.
