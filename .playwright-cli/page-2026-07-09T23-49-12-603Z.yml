    - article [ref=f2e402]:
      - generic [ref=f2e403]:
        - paragraph [ref=f2e404]: THÈSE DU PROJET
        - heading "Notes de lecture détaillées." [level=2] [ref=f2e405]
      - heading "Vue d’ensemble" [level=2] [ref=f2e406]
      - paragraph [ref=f2e407]: Voice Capture Studio est une application de navigateur local-first pour la capture vocale dirigée. Elle aide un locuteur à passer d’une session vide à des prises propres, révisables et accompagnées de transcriptions, timing, qualité et structure d’export.
      - paragraph [ref=f2e408]:
        - text: L’application est disponible sur
        - link "electronicartefacts.github.io/voice-capture-studio" [ref=f2e409]:
          - /url: https://electronicartefacts.github.io/voice-capture-studio/
        - text: et le code source est public sur
        - link "github.com/electronicartefacts/voice-capture-studio" [ref=f2e410]:
          - /url: https://github.com/electronicartefacts/voice-capture-studio
        - text: .
      - heading "Objectif" [level=2] [ref=f2e411]
      - paragraph [ref=f2e412]: Le projet existe parce que la voix professionnelle est souvent enregistrée avant que le workflow soit prêt. Une prise peut sembler utilisable, mais le prompt, la langue, le locuteur, la pièce, le micro, l’état de révision, le timing et le manifeste d’export peuvent se perdre dans des dossiers informels.
      - paragraph [ref=f2e413]: Voice Capture Studio traite ces détails comme une partie de l’enregistrement. L’application prépare un matériau vocal structuré pour archives, datasets de parole, voix off, doublage et workflows de machine learning en aval.
      - heading "Ce que l’application ne fait pas" [level=2] [ref=f2e414]
      - paragraph [ref=f2e415]: Voice Capture Studio n’entraîne pas de modèles d’IA. L’application enregistre la parole, révise les prises et exporte un matériau structuré. Tout entraînement, alignement, normalisation, traitement d’archive ou évaluation de modèle appartient à un workflow séparé avec ses propres exigences de gouvernance et de consentement.
      - paragraph [ref=f2e416]: "Cette frontière compte : l’application prépare le matériau source, elle ne prétend pas être une pipeline de modèle."
      - heading "Modes d’enregistrement" [level=2] [ref=f2e417]
      - paragraph [ref=f2e418]: "L’application live expose trois modes :"
      - list [ref=f2e419]:
        - listitem [ref=f2e420]: "Dataset ML : phrases calibrées, progression phonétique et exports prêts pour des workflows d’entraînement."
        - listitem [ref=f2e421]: "Doublage : texte collé ou fichier découpé en répliques enregistrables."
        - listitem [ref=f2e422]: "Master audio : texte local, piste de référence et capture de voix séparée."
      - paragraph [ref=f2e423]: "La page utilise “dataset” au sens de préparation : des enregistrements acceptés et leurs métadonnées peuvent devenir des entrées utiles, mais l’entraînement de modèle reste en aval."
      - heading "Fonctions clés" [level=2] [ref=f2e424]
      - list [ref=f2e425]:
        - listitem [ref=f2e426]: Sessions guidées pour corpus de départ français et anglais.
        - listitem [ref=f2e427]: Capture micro locale dans le navigateur.
        - listitem [ref=f2e428]: Export WAV PCM mono 48 kHz / 24-bit lorsque le navigateur le permet.
        - listitem [ref=f2e429]: Calibration du silence de pièce et premiers contrôles techniques.
        - listitem [ref=f2e430]: Métadonnées de transcription, timing, intention, prosodie et qualité pour chaque prise acceptée.
        - listitem [ref=f2e431]: États keeper, review et reject pour ne faire progresser la couverture que sur le matériau accepté.
        - listitem [ref=f2e432]: Workspace privé du navigateur avec téléchargements explicites et export dossier lorsque possible.
        - listitem [ref=f2e433]: Manifest PWA et service worker pour une distribution statique sur GitHub Pages.
      - heading "Architecture" [level=2] [ref=f2e434]
      - paragraph [ref=f2e435]: Le dépôt sépare le shell applicatif React des modules de domaine. Le shell coordonne capture navigateur, adaptateurs de stockage et orchestration d’export. Les domaines portent corpus, sessions, workspace, couverture, recording, speakers, settings et contrats d’export.
      - paragraph [ref=f2e436]: "La décision importante est la direction des dépendances : les domaines n’importent pas React, l’interface navigateur, les routes ou le CSS. Cela garde les comportements de capture, de planification du corpus et d’export testables hors d’une interface unique."
      - heading "Stack technique" [level=2] [ref=f2e437]
      - paragraph [ref=f2e438]: Voice Capture Studio est construit avec React, Vite et TypeScript. L’application utilise Web Audio pour la capture locale, le stockage navigateur pour l’état du workspace, la File System Access API lorsque disponible, le téléchargement explicite en fallback, un manifest PWA et un workflow de déploiement GitHub Pages.
      - paragraph [ref=f2e439]: La validation du dépôt vérifie formatage, linting, références TypeScript, tests unitaires et build de production.
      - heading "Philosophie de design" [level=2] [ref=f2e440]
      - paragraph [ref=f2e441]: "L’interface n’est pas un enregistreur générique. Elle fonctionne comme une petite surface de studio : choisir un mode, vérifier l’environnement, confirmer locuteur et langue, capturer la calibration, enregistrer les prises, puis exporter la session avec assez de métadonnées pour la relire plus tard."
      - paragraph [ref=f2e442]: Le design rend l’état technique visible parce qu’un logiciel local-first doit produire de la confiance. Mode de stockage, micro, support WAV, accès dossier, version du corpus et calibration font partie de l’expérience.
      - heading "Ouvrir source" [level=2] [ref=f2e443]
      - paragraph [ref=f2e444]: Le projet est publié sous licence MIT. L’open source est important ici parce que les workflows vocaux doivent être inspectables. Une équipe qui prépare de la voix doit savoir ce qui est stocké, ce qui est exporté, ce qui n’est jamais envoyé et où se situent les frontières de données.
      - paragraph [ref=f2e445]: Le dépôt inclut contribution guidelines, signalement sécurité, modèles d’issues, modèle de pull request et documentation d’architecture, corpus, workspace, export et GitHub Pages.
      - heading "Vie privée" [level=2] [ref=f2e446]
      - paragraph [ref=f2e447]: Les enregistrements vocaux et workspaces générés sont des données utilisateur. L’application est conçue pour que les prises restent dans le navigateur ou dans le dossier choisi par l’utilisateur. Le dépôt public doit contenir code et définitions de corpus, pas des voix privées.
      - paragraph [ref=f2e448]: Le stockage navigateur est utile, mais ce n’est pas une archive permanente. Les exports explicites et les workflows dossier sont donc des parties centrales du produit.
      - heading "Modèle d’export" [level=2] [ref=f2e449]
      - paragraph [ref=f2e450]: La cible principale est un dossier de session de capture structuré. Le dépôt documente fichiers JSON de session, locuteur, corpus et manifeste, WAV et transcript par prise, métadonnées de timing et d’intention, rapports qualité et rapports de préparation dataset.
      - paragraph [ref=f2e451]: Chaque prise acceptée est plus qu’un fichier audio. Elle porte assez de structure pour soutenir alignement, révision, analyse de couverture ou traitement d’archive en aval.
      - heading "Documentation" [level=2] [ref=f2e452]
      - paragraph [ref=f2e453]: "Points d’entrée utiles :"
      - list [ref=f2e454]:
        - listitem [ref=f2e455]:
          - link "Architecture doctrine" [ref=f2e456]:
            - /url: https://github.com/electronicartefacts/voice-capture-studio/blob/main/docs/architecture-doctrine.md
        - listitem [ref=f2e457]:
          - link "System model" [ref=f2e458]:
            - /url: https://github.com/electronicartefacts/voice-capture-studio/blob/main/docs/system-model.md
        - listitem [ref=f2e459]:
          - link "Corpus structure" [ref=f2e460]:
            - /url: https://github.com/electronicartefacts/voice-capture-studio/blob/main/docs/corpus-structure.md
        - listitem [ref=f2e461]:
          - link "Workspace structure" [ref=f2e462]:
            - /url: https://github.com/electronicartefacts/voice-capture-studio/blob/main/docs/workspace-structure.md
        - listitem [ref=f2e463]:
          - link "Export structure" [ref=f2e464]:
            - /url: https://github.com/electronicartefacts/voice-capture-studio/blob/main/docs/export-structure.md
      - heading "Roadmap" [level=2] [ref=f2e465]
      - paragraph [ref=f2e466]: La roadmap publique inclut la restauration/import de workspaces sauvegardés, des migrations explicites de schéma, des tombstones de corpus pour la compatibilité longue durée, un meilleur premier parcours de sélection de dossier, des cibles d’export supplémentaires et l’automatisation des captures/release artifacts.
      - paragraph [ref=f2e467]: Ces éléments relèvent de l’infrastructure produit. Ils distinguent une application locale prometteuse d’un vrai workflow d’archive vocale.
      - heading "Projets Electronic Artefacts liés" [level=2] [ref=f2e468]
      - paragraph [ref=f2e469]:
        - text: Voice Capture Studio se situe près d’
        - link "ORETH" [ref=f2e470]:
          - /url: /fr/programs/oreth/
        - text: parce que les deux traitent l’audio comme matériau structuré. Il se relie à l’
        - link "Audio web" [ref=f2e471]:
          - /url: /fr/knowledge/concepts/web-audio/
        - text: et au
        - link "Web Audio API" [ref=f2e472]:
          - /url: /fr/knowledge/technologies/web-audio-api/
        - text: parce que le navigateur est le runtime. Il se relie à l’
        - link "open source" [ref=f2e473]:
          - /url: /fr/knowledge/concepts/open-source/
        - text: parce que code et documentation sont inspectables.
      - paragraph [ref=f2e474]: "Le projet étend aussi l’écosystème Electronic Artefacts vers un artefact pratique de technologie vocale : un outil qui fait une chose clairement avant qu’une archive, un modèle, un doublage ou un workflow de production ne reçoive les données."
